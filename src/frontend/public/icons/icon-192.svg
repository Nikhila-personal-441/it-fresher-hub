<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="32" fill="#0a0a14"/>
  <!-- Graduation cap base -->
  <polygon points="96,44 148,68 96,92 44,68" fill="#1a73e8"/>
  <!-- Cap top board (slightly rotated square) -->
  <rect x="71" y="39" width="50" height="8" rx="2" fill="#4da3ff" transform="rotate(-2, 96, 43)"/>
  <!-- Left side of cap -->
  <polygon points="44,68 44,90 60,97 60,75" fill="#1558b0"/>
  <!-- Right side of cap -->
  <polygon points="148,68 148,90 132,97 132,75" fill="#1558b0"/>
  <!-- Tassel string -->
  <line x1="148" y1="68" x2="148" y2="110" stroke="#4da3ff" stroke-width="3"/>
  <circle cx="148" cy="115" r="6" fill="#4da3ff"/>
  <!-- Tech circuit dots -->
  <circle cx="58" cy="130" r="4" fill="#1a73e8" opacity="0.7"/>
  <circle cx="96" cy="138" r="4" fill="#4da3ff" opacity="0.7"/>
  <circle cx="134" cy="130" r="4" fill="#1a73e8" opacity="0.7"/>
  <line x1="58" y1="130" x2="96" y2="138" stroke="#1a73e8" stroke-width="1.5" opacity="0.5"/>
  <line x1="96" y1="138" x2="134" y2="130" stroke="#1a73e8" stroke-width="1.5" opacity="0.5"/>
  <!-- IFH text -->
  <text x="96" y="168" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#e8f0fe" text-anchor="middle" letter-spacing="3">IFH</text>
</svg>
