  <rect x="196" y="278" width="120" height="8" rx="3" fill="#4da3ff" opacity="0.6"/>
  <rect x="196" y="294" width="100" height="5" rx="2" fill="#4da3ff" opacity="0.4"/>
  <rect x="196" y="306" width="80" height="5" rx="2" fill="#4da3ff" opacity="0.3"/>
  <rect x="196" y="318" width="60" height="5" rx="2" fill="#4da3ff" opacity="0.2"/>
