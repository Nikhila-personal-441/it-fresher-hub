  <line x1="256" y1="385" x2="362" y2="360" stroke="#1a73e8" stroke-width="3" opacity="0.5"/>
  <circle cx="150" cy="360" r="4" fill="#4da3ff"/>
  <circle cx="362" cy="360" r="4" fill="#4da3ff"/>
  <!-- Star sparkle -->
